# civilization_sim configuration file. This file mirrors the attributes of CivilizationScenario

rng: null               # RNG seed; null = random each run
output_dir: output/default


population_initial_size: 100
population_max_size: 1000
population_utility_fn: survival   # survival | enlightenment

resources_initial: 10.0
resources_initial_offspring: 5.0
resources_survival_cost: 1.0
resources_rest_gain: 0.3
resources_forage_gain: [1.5, 3.5]
resources_reproduction_threshold: 15.0
resources_reproduction_cost: 5.0
resources_min_reproduction_age: 13
resources_max_reproduction_age: 60
resources_max_age: 80

# ---------------------------------------------------------------------------
# Trait initial distributions
# Each trait: [mean, std_dev]; values are clamped to [0, 1]
# ---------------------------------------------------------------------------
traits_curiosity: [.5, .2]
traits_pattern_recognition: [.5, .2]
traits_abstraction: [.4, .2]
traits_memory_narrative: [.5, .2]
traits_social_desire: [.6, .2]
traits_dominance: [.5, .2]
traits_empathy: [.5, .2]
traits_trust: [.45, .2]
traits_conformity: [.5, .2]
traits_risk_tolerance: [.5, .2]
traits_aggression: [.45, .2]
traits_industriousness: [.5, .2]
traits_patience: [.5, .2]
traits_wonder: [.4, .2]
traits_attribution_style: [.5, .25]
traits_reverence: [.4, .2]


trait_drift_rate: .02
trait_drift_max_deviation: .03
social_encounter_probability: .25
social_group_formation_threshold: .45
social_cooperation_bonus: .30
heritability_variance: .10
inspiration_probability: .01
unknown_player_event_probability: .01
# unknown_player_event_types: []
# endgames:
endgames_max_steps: 1000


# ---------------------------------------------------------------------------
# Social technology emergence thresholds
# These mirror REGISTRY in core/social_tech.py but can be tuned here.
# (Currently the REGISTRY uses its own defaults; this section is reserved
# for future config-driven threshold overrides.)
